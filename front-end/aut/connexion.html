<html>
    <head>
    <title>ListUP</title>
    <link rel="stylesheet" href="/aut/aut.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href='https://cdn.boxicons.com/3.0.3/fonts/transformations.min.css' rel='stylesheet'>
    </head>

    <body>
        <header> 
            <h1 class="name">ListUP</h1>
        </header>
        
        <main>
                <div class="box">
                        <h2>Connexion</h2>
                    <form id="loginformID">
                    
                    <div class="input-group">
                        <input type="email" placeholder="Email" id="loginemailID" required>
                        <i class="bx bx-at"></i>
                    </div>

                    <div class="input-group">
                            <input type="password" placeholder="Mot de passe" id="loginpasswordID" minlength="8" required>
                            <i class="bx bx-lock"></i>
                    </div>
 
                    <div>
                        <p>Tu n'as pas de compte ? <a href="/aut/inscription.html">Inscription</a></p>
                    </div>

                            <button type="submit">Se connecter</button>
                    </form>
                </div>
        </main>
        
        <script src="/app.js"></script>

    </body>
</html>
