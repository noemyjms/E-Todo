<html>
    <head>
    <title>ListUP</title>
    <link rel="stylesheet" href="/aut/aut.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href='https://cdn.boxicons.com/3.0.3/fonts/transformations.min.css' rel='stylesheet'>
    </head>

    <body>
        <header> 
            <h1 class="name">ListUP</h1>
        </header>
        
        <main>            
            <div class="box">
                <h2>Inscription</h2>
                <form id="registerformID">
                    <div class="input-group">
                        <input type="text" placeholder="Prénom" id="regfirstnameID" required>
                        <i class="bx bx-user"></i>
                    </div>

                     <div class="input-group">
                            <input type="text" placeholder="Nom" id="regusernameID" required>
                            <i class="bx bx-user"></i>
                    </div>

                    <div class="input-group">
                        <input type="email" placeholder="Email" id="regemailID" required>
                        <i class="bx bx-at"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" placeholder="Mot de passe" id="regpasswordID" required>
                        <i class="bx bx-lock"></i>
                    </div>

                    <div class="link-form">
                    <p>Already have an account? <a href="/aut/connexion.html">Login</a></p>
                    </div>

                        <button type="submit">S'inscrire</button>
                </form>
            </div>
        </main>

        <script src="/app.js"></script>

    </body>
</html>
